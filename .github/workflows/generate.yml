name: Refresh prodcal.ics

on:
  schedule:
    - cron: "0 6 1 * *"  # # monthly, 1st day at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: prodcal-ics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate prodcal.ics
        run: |
          mkdir -p out

          YEAR=$(date -u +%Y)
          START_YEAR=$((YEAR-1))
          END_YEAR=$((YEAR+1))

          python prodcal_ics.py \
            --start-year=$START_YEAR \
            --end-year=$END_YEAR \
            -o out/prodcal.ics

          # Copy static site files
          cp index.html out/index.html
          cp style.css out/style.css

          # Build meta.json for the page
          UPDATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://justSmK.github.io/prodcal-ics"

          cat > out/meta.json << EOF
          {
            "updatedAtUtc": "${UPDATED_AT}",
            "subscribeUrl": "${BASE_URL}/prodcal.ics",
            "years": [$START_YEAR, $YEAR, $END_YEAR],
            "hhCalendarUrl": "https://hh.ru/calendar"
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
